<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReCON_SYSTEM</title>

<style>

body {
  margin: 0;
  background: linear-gradient(135deg, #0f1218, #1a1f2b);
  font-family: sans-serif;
}

/* ===== バナー本体 ===== */
.glass-banner {
  position: relative;

  max-width: 900px;
  margin: 80px auto;
  padding: 60px 40px;
  border-radius: 20px;

  overflow: hidden;

  /* ガラス */
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ===== 背景キャラ（ここが本体） ===== */
.glass-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: url("img/yate.png") no-repeat left center;
  background-size: contain;

  opacity: 0.18;   /* ←ここが“薄さ” */
  pointer-events: none;
}

/* ===== 暗めフィルター（文字見やすく） ===== */
.glass-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    to right,
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.2)
  );

  pointer-events: none;
}

/* ===== 文字エリア ===== */
.glass-right {
  position: relative;
  z-index: 1;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== 中央テキスト ===== */
.glass-content {
  text-align: center;
  color: #fff;
}

.glass-content h1 {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: 2px;
  margin-bottom: 8px;

  text-shadow: 0 0 12px rgba(255,255,255,0.25);
}

.glass-content p {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 1px;
}


</head>

<body>

<div class="glass-banner">

  <div class="glass-right">
    <div class="glass-content">
      <h1>RE-CON SYSTEM</h1>
      <p>司令システム構築中</p>
    </div>
  </div>

</div>


</body>
</html>
