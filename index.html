<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReCON_SYSTEM</title>

<style>

/* ===== ベース ===== */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  font-family: sans-serif;

  background: linear-gradient(135deg, #0f1218, #1a1f2b);
}


/* ===== バナー本体 ===== */
.glass-banner {
  position: relative;

  width: 90%;
  max-width: 900px;

  padding: 60px 40px;
  border-radius: 20px;

  overflow: hidden;

  /* ガラス */
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}


/* ===== 背景キャラ ===== */
.glass-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: url("img/yate.png") no-repeat left center;
  background-size: contain;

  opacity: 0.18; /* ←薄さ調整 */
  pointer-events: none;
}


/* ===== 暗めフィルター ===== */
.glass-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    to right,
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.2)
  );

  pointer-events: none;
}


/* ===== テキスト ===== */
.glass-content {
  position: relative;
  z-index: 1;

  text-align: center;
  color: #fff;
}

.glass-content h1 {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: 2px;
  margin-bottom: 8px;

  text-shadow: 0 0 12px rgba(255,255,255,0.25);
}

.glass-content p {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 1px;
}


/* ===== モバイル ===== */
@media (max-width: 600px) {
  .glass-banner {
    padding: 40px 20px;
  }

  .glass-content h1 {
    font-size: 22px;
  }
}

</style>
</head>

<body>

<div class="glass-banner">
  <div class="glass-content">
    <h1>ReCON_SYSTEM</h1>
    <p>司令システム構築中</p>
  </div>
</div>

</body>
</html>
